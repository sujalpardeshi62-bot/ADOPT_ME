<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Animals – AdoptMe Admin</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/admin.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>
<body data-page="manage-animals">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <h2>AdoptMe Admin</h2>
      <a href="admin-dashboard.html">Dashboard</a>
      <a href="manage-users.html">Manage Users</a>
      <a href="manage-animals.html" class="active">Manage Animals</a>
      <a href="manage-adoptions.html">Manage Adoptions</a>
      <a href="manage-donations.html">Manage Donations</a>
      <a href="manage-volunteers.html">Manage Volunteers</a>
      <a href="manage-rescue.html">Manage Rescue</a>
      <a href="manage-lostfound.html">Manage Lost & Found</a>
      <a href="manage-events.html">Manage Events</a>
      <a href="../index.html">Back to Site</a>
    </aside>

    <main class="admin-main">
      <div class="admin-page-head">
        <h1>Manage Animals</h1>
      </div>

      <div class="card admin-form-card">
        <h2>Add / Edit Animal</h2>
        <form id="animalForm" class="admin-form">
          <input type="hidden" id="animalId" />

          <div class="form-grid">
            <input type="text" id="animalName" placeholder="Pet Name" required />
            <input type="text" id="animalSpecies" placeholder="Species" required />
            <input type="text" id="animalAge" placeholder="Age" required />
            <input type="text" id="animalLocation" placeholder="Location" required />
            <input type="text" id="animalBreed" placeholder="Breed" required />
            <input type="url" id="animalImage" placeholder="Image URL" required />
          </div>

          <div class="admin-form-actions">
            <button type="submit" class="btn btn-primary">Save Animal</button>
            <button type="button" id="resetAnimalForm" class="btn btn-secondary">Reset</button>
          </div>
        </form>
      </div>

      <div class="card">
        <div id="adminAnimalsList" class="stack-list"></div>
      </div>
    </main>
  </div>

  <script src="../adminjs/main.js"></script>
  <script src="../adminjs/admin.js"></script>
</body>
</html>
